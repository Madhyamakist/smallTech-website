name: publish-to-github-pages
on:
  push:
    branches:
      - main
      - deploy
      - 'dev*'


permissions:
  contents: write


jobs:
  # Production build (root) - only on main
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4


      - name: Setup Node.js ⚙️ - Cache dependencies ⚡ - Install dependencies 🔧
        uses: ./.github/workflows/setup-node


      - name: Build with Next.js 🏗️
        run: npx next build
        working-directory: ./code


      - name: Upload artifact 📡
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./code/out


  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Deploy production to root (preserve /staging) 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./code/out
          cname: smalltech.in
          keep_files: true

  # Staging build+deploy to /staging for any dev* branch
  staging:
    if: startsWith(github.ref, 'refs/heads/dev')
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_BASE_PATH: /staging

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️ - Cache dependencies ⚡ - Install dependencies 🔧
        uses: ./.github/workflows/setup-node

      - name: Build with Next.js 🏗️ (basePath=/staging)
        run: npx next build
        working-directory: ./code

      - name: Deploy to /staging (preserve root) 🚀
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./code/out
          destination_dir: staging
          keep_files: true

